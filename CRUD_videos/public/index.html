<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Práctica 3 - Tienda con Express y MySQL</title>
    <link rel="stylesheet" href="./css/style.css">
</head>
<body>

    <header>
        <h1>Sistema de Compras</h1>
        <p>Práctica 3 — Express + CORS + Relaciones entre Tablas</p>
        <!-- Navegación por pestañas para cambiar entre secciones -->
        <nav class="tabs">
            <button class="tab active" onclick="cambiarSeccion('usuarios')">Usuarios</button>
            <button class="tab" onclick="cambiarSeccion('video')">Tipo de Video</button>
            <button class="tab" onclick="cambiarSeccion('busqueda')">Busqueda</button>
        </nav>
    </header>

    <main>

        <!-- Panel de estado de la API -->
        <section class="info-api">
            <h3>Estado de la API</h3>
            <div class="api-status">
                <span id="api-metodo" class="badge">-</span>
                <span id="api-url" class="api-url">-</span>
                <span id="api-codigo" class="badge badge-neutral">-</span>
            </div>
        </section>

        <!-- ========================================================= -->
        <!-- SECCIÓN: USUARIOS -->
        <!-- ========================================================= -->
        <div id="seccion-usuarios" class="seccion">

            <section class="formulario-section">
                <h2 id="form-titulo-usuario">Agregar Usuario</h2>
                <form id="form-usuario" novalidate>
                    <input type="hidden" id="usuario-id">
                    <div class="campos-grid">
                        <div class="campo">
                            <label for="usuario-nombre">Nombre:</label>
                            <input type="text" id="usuario-nombre" placeholder="Ej: María García" maxlength="100" required>
                            <span class="error" id="error-usuario-nombre"></span>
                        </div>
                        <div class="campo">
                            <label for="usuario-email">Email:</label>
                            <input type="email" id="usuario-email" placeholder="Ej: maria@email.com" maxlength="150" required>
                            <span class="error" id="error-usuario-email"></span>
                        </div>
                    </div>
                    <div class="botones">
                        <button type="submit" id="btn-guardar-usuario">Guardar</button>
                        <button type="button" id="btn-cancelar-usuario" class="btn-secundario" style="display:none;">Cancelar</button>
                    </div>
                </form>
            </section>

            <section class="tabla-section">
                <h2>Usuarios <span id="contador-usuarios" class="badge badge-neutral"></span></h2>
                <p id="carga-usuarios">Cargando...</p>
                <table id="tabla-usuarios" style="display:none;">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Nombre</th>
                            <th>Email</th>
                            <th>Acciones</th>
                        </tr>
                    </thead>
                    <tbody id="tbody-usuarios"></tbody>
                </table>
            </section>
        </div>

        <!-- Notificaciones -->
        <div id="notificacion" class="notificacion" style="display:none;"></div>

    </main>

    <footer>
        <p>PNT — Práctica 3: Express + CORS + Relaciones MySQL</p>
    </footer>

    <script src="./js/app.js"></script>
</body>
</html>
