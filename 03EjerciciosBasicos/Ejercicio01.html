<!DOCTYPE html>
<html lang="es">
<head>

<body>
    <div class="Ejercicio01">

        name="formularioejer1" action="">

            Formulario para calcular una inversión al 10% de 
            interés anual
        </label>
        <div class="container-table">
            <table class="table">
                <tr>
                    <td>
                        Introduce la cantidad que deseas 
                        invertir por todo 1 año:
                    </td>
                    <td>
                        <input type="text" name="cantidad"
                        id="cantidadi" onkeypress="return validarn(event)">
                    </td>
                </tr>
                <tr>
                    <td></td>
                    <td>
                        <input type="button" value="Calcular interés" name="enviar" onclick="interes()">
                    </td>
                </tr>
                <tr>
                    <td>
                        Su saldo es de:
                    </td>
                    <td>
                        <input type="text" name="sueldoi" id="sueldoi" readonly="readonly">
                    </td>
                </tr>
                <tr>
                    <td></td>
                    <td>
                        <input type="button" value="Borrar datos" name="delete" onclick="borrar()">
                    </td>
                </tr>
            </table>
        </div>
        </form>
    </div>
    <script src="./interes.js"></script>
